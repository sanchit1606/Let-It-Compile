name: Deploy index.html to GitHub Pages

on:
  # Manual only (prevents constant auto-publishing)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site artifact (index.html only)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site
          cp docs/index.html site/index.html
          # Deploy required static assets referenced by index.html
          cp docs/styles.css site/styles.css
          cp docs/script.js site/script.js
          # Optional custom domain
          if [ -f docs/CNAME ]; then cp docs/CNAME site/CNAME; fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
          name: github-pages-${{ github.run_attempt }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
